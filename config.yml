    color: "dendrite_violet"
    items:
      - "TypeScript"
      - "React"
      - "Next.js"
  - name: "Backend"
    color: "synapse_cyan"
    items:
      - "Node.js"
      - "C#"
      - "Java"
  - name: "DevOps"
    color: "axon_amber"
    items:
      - "Docker"
      - "Azure"
      - "MySQL"

# Featured projects shown as constellation stars
# arm: 0-2 = which galaxy arm (index above)
projects:
  - repo: "EduardoABrito/mcp-investidor10"
    arm: 1
    description: "Model Context Protocol server for the Status Invest API."
  - repo: "EduardoABrito/template-nestjs-api"
    arm: 1
    description: "Reusable NestJS API starter template."
  - repo: "EduardoABrito/face_recognition"
    arm: 0
    description: "Face recognition experiment in TypeScript."

# Theme color overrides — tuned to your purple brand (#6c00fa)
theme:
  void: "#0d1117"              # Darkest background (matches your old README)
  nebula: "#0f1623"            # Card backgrounds
  star_dust: "#1a2332"         # Borders, dividers
  synapse_cyan: "#00d4ff"      # Primary accent (arm color 1)
  dendrite_violet: "#6c00fa"   # Your brand purple (arm color 2)
  axon_amber: "#ffb020"        # Tertiary accent (arm color 3)
  text_bright: "#f1f5f9"       # Primary text
  text_dim: "#94a3b8"          # Secondary text
  text_faint: "#64748b"        # Muted text, labels

# Stats configuration — which metrics to show on the telemetry card
stats:
  metrics:
    - "commits"
    - "stars"
    - "prs"
    - "issues"
    - "repos"

# Language display settings
languages:
  exclude:
    - "Shell"
    - "Makefile"
  max_display: 8
